<article>
  <h1>OS Process</h1>
  <p>프로세스는 실행 중인 프로그램의 인스턴스입니다. 운영체제는 각 프로세스에 독립된 메모리 공간을 제공합니다.</p>
  <h2>프로세스 상태</h2>
  <ul>
    <li><strong>Ready</strong>: CPU 할당을 기다리는 상태</li>
    <li><strong>Running</strong>: CPU에서 실행 중인 상태</li>
    <li><strong>Waiting</strong>: I/O 등의 이벤트를 기다리는 상태</li>
  </ul>
</article>
